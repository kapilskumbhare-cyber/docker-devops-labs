<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Volumes Lab</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 700px;
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,.4);
        }

        h1 {
            color: #38bdf8;
            font-size: 42px;
            margin-bottom: 20px;
        }

        h2 {
            color: #22c55e;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            color: #d1d5db;
        }

        .highlight {
            color: #facc15;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 15px;
        }

        .badge {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 22px;
            background: #22c55e;
            color: white;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>📦 Docker Volumes Lab</h1>

    <h2>Persistent Storage Demo</h2>

    <p>
        This page is stored inside a
        <span class="highlight">Docker Volume</span>.
    </p>

    <p>
        Even if the container is removed and recreated,
        the data remains available because it is stored
        outside the container.
    </p>

    <div class="badge">
        ✅ Data Persistence Verified
    </div>

    <div class="footer">
        DevOps Docker Labs • Lab 05 • Docker Volumes
    </div>

</div>

</body>
</html>
